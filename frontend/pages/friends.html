<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Amigos</title>
        <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
        <link rel="stylesheet" href="../src/style.css" id="main-style" />
        <link rel="stylesheet" href="../src/components/navbar/navbar.css" />
        <link rel="stylesheet" href="../src/components/friends/friends.css" />
    </head>
    <body>
        <div id="preloader">
          <div class="loader"></div>
        </div>

        <div class="main-container">
            <nav class="sidebar" id="navbar">
                <div class="sidebar-top-part">
                    <a href="../index.html">
                        <img class="sidebar-logo" src="../public/images/logo_Uni2_Go.svg" />
                    </a>
                    <span class="sidebar-button bx bx-sm bx-sidebar"></span>
                </div>

                <ul class="buttons-list">
                    <li class="calendar">
                        <a href="./calendar.html">
                            <i class="bx bx-sm bx-calendar"></i>
                            <span class="font-bold">Calendar</span>
                        </a>
                    </li>
                    <li class="chat">
                        <a href="./chat.html">
                            <i class="bx bx-sm bx-chat"></i>
                            <span class="font-bold">Chat</span>
                        </a>
                    </li>
                    <li class="notifications">
                        <a href="./notifications.html">
                            <i class="bx bx-sm bx-bell"></i>
                            <span class="font-bold">Noifications</span>
                        </a>
                    </li>
                    <li class="grupos">
                        <a href="./grupos.html">
                            <i class="bx bx-sm bx-group"></i>
                            <span class="font-bold">Grupos</span>
                        </a>
                    </li>
                    <li class="friends">
                        <a class="button-change-page-active" href="./friends.html">
                            <i class="bx bx-sm bx-user-plus"></i>
                            <span class="font-bold">Amigos</span>
                        </a>
                    </li>
                    <li class="lista-de-compras">
                        <a href="./lista_de_compras.html">
                            <i class="bx bx-sm bx-edit"></i>
                            <span class="font-bold">Lista de Compras</span>
                        </a>
                    </li>
                    <li class="info">
                        <a href="./sobre_nosotros.html">
                            <i class="bx bx-sm bx-info-circle"></i>
                            <span class="font-bold">Info</span>
                        </a>
                    </li>
                    <li class="usuario">
                        <a href="./user.html">
                            <i class="bx bx-sm bx-user"></i>
                            <span class="font-bold">Usuario</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="content-wrapper">
                <div class="friends-page">

                    <!-- Search -->
                    <section class="friends-search-section">
                        <h2>Buscar por @username</h2>
                        <div class="friends-search-row">
                            <input type="text" id="username-search-input" placeholder="@username" />
                            <button id="username-search-btn">Buscar</button>
                        </div>
                        <div id="search-result" class="search-result hidden"></div>
                    </section>

                    <!-- Incoming requests -->
                    <section class="friends-section">
                        <h2>Solicitudes recibidas <span id="requests-badge" class="hidden"></span></h2>
                        <ul id="requests-list" class="friends-list">
                            <li class="friends-empty">No tienes solicitudes pendientes</li>
                        </ul>
                    </section>

                    <!-- Friends list -->
                    <section class="friends-section">
                        <h2>Mis amigos</h2>
                        <ul id="friends-list" class="friends-list">
                            <li class="friends-empty">No tienes amigos aún</li>
                        </ul>
                    </section>

                </div>
            </div>
        </div>

        <script type="module" src="../src/components/preloader/preloader.js"></script>
        <script type="module" src="../src/services/authGuard.js"></script>
        <script type="module" src="../src/components/navbar/navbar.js"></script>
        <script type="module" src="../src/components/friends/friends.js"></script>
    </body>
</html>
