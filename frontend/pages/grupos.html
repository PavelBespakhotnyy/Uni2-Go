<!doctype html>
<html lang="es">
    <head>
        <!-- Metas -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Page Title -->
        <title>Grupos</title>
        <!-- Connecting Styles -->
        <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../src/style.css" id="main-style" />
        <link rel="stylesheet" href="../src/components/navbar/navbar.css" />
        <link rel="stylesheet" href="../src/components/grupos/grupos.css" />
    </head>
    <body>
        <div id="preloader">
          <div class="loader"></div>
        </div>

        <div class="main-container">
            <nav class="sidebar" id="navbar">
                <div class="sidebar-top-part">
                    <a href="../index.html">
                        <img
                            class="sidebar-logo"
                            src="../public/images/logo_Uni2_Go.svg"
                        />
                    </a>
                    <span class="sidebar-button bx bx-sm bx-sidebar"></span>
                </div>

                <ul class="buttons-list">
                    <!-- Calendar -->
                    <li class="calendar">
                        <a href="./calendar.html">
                            <i class="bx bx-sm bx-calendar"></i>
                            <span class="font-bold">Calendar</span>
                        </a>
                    </li>
                    <!-- Chat -->
                    <li class="chat">
                        <a href="./chat.html">
                            <i class="bx bx-sm bx-chat"></i>
                            <span class="font-bold">Chat</span>
                        </a>
                    </li>
                    <!-- Noifications -->
                    <li class="notifications">
                        <a href="./notifications.html">
                            <i class="bx bx-sm bx-bell"></i>
                            <span class="font-bold">Noifications</span>
                        </a>
                    </li>
                    <!-- Grupos -->
                    <li class="grupos">
                        <a
                            class="button-change-page-active"
                            href="./grupos.html"
                        >
                            <i class="bx bx-sm bx-group"></i>
                            <span class="font-bold">Grupos</span>
                        </a>
                    </li>
                    <!-- Amigos -->
                    <li class="friends">
                        <a href="./friends.html">
                            <i class="bx bx-sm bx-user-plus"></i>
                            <span class="font-bold">Amigos</span>
                        </a>
                    </li>
                    <!-- Lista de Compras -->
                    <li class="lista-de-compras">
                        <a href="./lista_de_compras.html">
                            <i class="bx bx-sm bx-edit"></i>
                            <span class="font-bold">Lista de Compras</span>
                        </a>
                    </li>
                    <!-- Carpetas -->
                    <li class="carpetas">
                        <a href="./carpetas.html">
                            <i class="bx bx-sm bx-folder"></i>
                            <span class="font-bold">Carpetas</span>
                        </a>
                    </li>
                    <!-- Info -->
                    <li class="info">
                        <a href="./sobre_nosotros.html">
                            <i class="bx bx-sm bx-info-circle"></i>
                            <span class="font-bold">Info</span>
                        </a>
                    </li>
                    <!-- Usuario -->
                    <li class="usuario">
                        <a href="./user.html">
                            <i class="bx bx-sm bx-user"></i>
                            <span class="font-bold">Usuario</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="content-wrapper">
                <div class="controls-bar">
                    <div class="search-container">
                        <i class="bx bx-search search-icon"></i>
                        <input type="text" id="groupSearch" class="search-input" placeholder="Buscar ..." />
                    </div>
                </div>

                <div class="groups-container">
                    <div id="groupsGrid" class="groups-grid">
                        <!-- Groups will be rendered here -->
                    </div>
                </div>

                <div class="pagination-container" style="display:none">
                    <div class="pagination-list"></div>
                </div>
            </main>
        </div>

        <script
            type="module"
            src="../src/components/preloader/preloader.js"
        ></script>
        <script type="module" src="../src/services/authGuard.js"></script>
        <script type="module" src="../src/components/navbar/navbar.js"></script>
        <script type="module" src="../src/components/grupos/grupos.js"></script>
    </body>
</html>
