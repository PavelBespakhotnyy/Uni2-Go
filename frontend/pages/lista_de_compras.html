<!doctype html>
<html lang="es">
    <head>
        <!-- Metas -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Page Title -->
        <title>Lista de Compras</title>
        <!-- Connecting Styles -->
        <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../src/style.css" id="main-style" />
        <link rel="stylesheet" href="../src/components/navbar/navbar.css" />
        <link rel="stylesheet" href="../src/components/lista_de_compras/lista_de_compras.css" />
    </head>
    <body>
        <div id="preloader">
          <div class="loader"></div>
        </div>

        <div class="main-container">
            <nav class="sidebar" id="navbar">
                <div class="sidebar-top-part">
                    <a href="../index.html">
                        <img
                            class="sidebar-logo"
                            src="../public/images/logo_Uni2_Go.svg"
                        />
                    </a>
                    <span class="sidebar-button bx bx-sm bx-sidebar"></span>
                </div>

                <ul class="buttons-list">
                    <!-- Calendar -->
                    <li class="calendar">
                        <a href="./calendar.html">
                            <i class="bx bx-sm bx-calendar"></i>
                            <span class="font-bold">Calendar</span>
                        </a>
                    </li>
                    <!-- Chat -->
                    <li class="chat">
                        <a href="./chat.html">
                            <i class="bx bx-sm bx-chat"></i>
                            <span class="font-bold">Chat</span>
                        </a>
                    </li>
                    <!-- Noifications -->
                    <li class="notifications">
                        <a href="./notifications.html">
                            <i class="bx bx-sm bx-bell"></i>
                            <span class="font-bold">Noifications</span>
                        </a>
                    </li>
                    <!-- Grupos -->
                    <li class="grupos">
                        <a href="./grupos.html">
                            <i class="bx bx-sm bx-group"></i>
                            <span class="font-bold">Grupos</span>
                        </a>
                    </li>
                    <!-- Lista de Compras -->
                    <li class="lista-de-compras">
                        <a class="button-change-page-active" href="./lista_de_compras.html">
                            <i class="bx bx-sm bx-edit"></i>
                            <span class="font-bold">Lista de Compras</span>
                        </a>
                    </li>
                    <!-- Carpetas -->
                    <li class="carpetas">
                        <a href="./carpetas.html">
                            <i class="bx bx-sm bx-folder"></i>
                            <span class="font-bold">Carpetas</span>
                        </a>
                    </li>
                    <!-- Info -->
                    <li class="info">
                        <a href="./sobre_nosotros.html">
                            <i class="bx bx-sm bx-info-circle"></i>
                            <span class="font-bold">Info</span>
                        </a>
                    </li>
                    <!-- Usuario -->
                    <li class="usuario">
                        <a href="./user.html">
                            <i class="bx bx-sm bx-user"></i>
                            <span class="font-bold">Usuario</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="content-wrapper">
                <div class="shopping-page-wrapper">
                    <!-- Sub-sidebar for lists -->
                    <div class="shopping-lists-sidebar">
                        <div class="sidebar-categories">
                            <div class="category-btn active" id="btn-show-lists">
                                <i class='bx bx-list-ul'></i>
                                <span>Listas</span>
                            </div>
                            <div class="category-btn" id="btn-show-notes">
                                <i class='bx bx-note'></i>
                                <span>Notas</span>
                            </div>
                        </div>

                        <div class="add-item-btn" id="add-list-btn">
                            <span>Añadir lista</span>
                            <i class='bx bx-plus bx-md'></i>
                        </div>
                        <div class="add-item-btn" id="add-note-btn" style="display: none;">
                            <span>Añadir nota</span>
                            <i class='bx bx-plus bx-md'></i>
                        </div>

                        <div id="sidebar-lists-container" class="sidebar-scroll-container">
                            <!-- Lists will be added here -->
                            <div class="lists-header active-list">
                                <h2 id="list-title">Lista de la compra</h2>
                                <i class='bx bx-pencil bx-sm edit-title-btn' style="cursor: pointer;"></i>
                            </div>
                        </div>

                        <div id="sidebar-notes-container" class="sidebar-scroll-container" style="display: none;">
                            <!-- Notes will be added here -->
                        </div>
                    </div>

                    <!-- Main shopping content -->
                    <div class="shopping-main-content">
                        <div class="search-container">
                            <i class='bx bx-search'></i>
                            <input type="text" placeholder="Buscar ...">
                        </div>

                        <!-- Products View -->
                        <div class="products-container" id="products-list">
                            <!-- Items will be added here dynamically -->
                            
                            <!-- Add Product button -->
                            <div class="add-product-card" id="add-product-btn">
                                <i class='bx bx-plus'></i>
                                <span>Añadir producto</span>
                            </div>
                        </div>

                        <!-- Notes View -->
                        <div class="notes-container" id="notes-list" style="display: none;">
                            <div class="note-paper">
                                <div class="note-header">
                                    <i class='bx bx-pencil pencil-icon'></i>
                                    <input type="text" id="note-title-input" placeholder="Título de la nota..." class="note-title-field">
                                </div>
                                <textarea id="note-content-input" placeholder="Escribe tu nota aquí..." class="note-content-field"></textarea>
                                <div class="note-footer">Uni2Go Notepad</div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div id="save-status" class="save-status">
            <div class="spinner"></div>
            <span>Guardando...</span>
        </div>

        <script
            type="module"
            src="../src/components/preloader/preloader.js"
        ></script>
        <script type="module" src="../src/services/authGuard.js"></script>
        <script type="module" src="../src/components/navbar/navbar.js"></script>
        <script type="module" src="../src/components/lista_de_compras/lista_de_compras.js"></script>
    </body>
</html>
