<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../public/images/calendar.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="../public/images/calendar.ico">
    <title>Iniciar session</title>
    <link rel="stylesheet" href="/src/components/preloader/preloader.css">

</head>
<body>

    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div id="content">

        <a href="/">
            <img src="/images/flecha 1.svg">
        </a>
        <form id="loginForm">
            <a>
                <img src="/images/logo_Uni2_Go.svg">
            </a>
            <h1>Inicia Sesión</h1>
            <div>
                <label>Correo electronico</label></br>
                <input type="text" name="email" placeholder="Email">
            </div>
            <div>
                <label>Contraseña</label></br>
                <input type="password" name="password">
            </div>
            <a href="./recover_password">Has olvidado tu contraseña?</a>
            <input type="submit" name="enviar" valor="Iniciar Sesion">
        </form>
    </div>

    <script type="module" src="../src/main.js"></script>
    <script type="module" src="../src/components/preloader/preloader.js"></script>
    <script type="module" src="../src/components/login/login.js"></script>

</html>
