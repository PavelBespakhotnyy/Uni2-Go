<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Test</title>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="pages pages-high">
            <!-- Open/Close Navbar -->

            <!-- Calendario -->
            <a class="navbar-el-calendario" href="./calendar.html">
                <img src="../public/images/navbar/icono calendario.svg">
            </a>
            <!-- Chat -->
            <a class="navbar-el-chat">
                <img src="../public/images/navbar/icono chat.svg">

            <!-- Notificaciones -->
            <a class="navbar-el-notificaciones">
                <img src="../public/images/navbar/icono noti.svg">

            <a class="navbar-el-grupos">

            </a>

            <a class="navbar-el-lista-de-compras">
                <img src="../public/images/navbar/icono lista.svg">
            </a>
            <!-- Carpetas -->
            <a class="navbar-el-carpetas">

            </a>
        </div>
        <div class="pages pages-low">
            <!-- Info (Sobre Nosotros) -->
            <a class="navbar-el-carpetas">
                <img src="../public/images/navbar/icono informacion.svg">
            </a>

            <a class="navbar-el-carpetas">
