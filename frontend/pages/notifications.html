<!doctype html>
<html lang="es">
    <head>
        <!-- Metas -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Page Title -->
        <title>Notifications</title>
        <!-- Connecting Styles -->
        <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../src/style.css" id="main-style" />
        <link rel="stylesheet" href="../src/components/navbar/navbar.css" />
        <link rel="stylesheet" href="../src/components/notifications/notifications.css" />
    </head>
    <body>
        <div id="preloader">
          <div class="loader"></div>
        </div>

        <div class="main-container">
            <nav class="sidebar" id="navbar">
                <div class="sidebar-top-part">
                    <a href="../index.html">
                        <img
                            class="sidebar-logo"
                            src="../public/images/logo_Uni2_Go.svg"
                        />
                    </a>
                    <span class="sidebar-button bx bx-sm bx-sidebar"></span>
                </div>

                <ul class="buttons-list">
                    <li class="calendar">
                        <a href="./calendar.html">
                            <i class="bx bx-sm bx-calendar"></i>
                            <span class="font-bold">Calendar</span>
                        </a>
                    </li>
                    <li class="chat">
                        <a href="./chat.html">
                            <i class="bx bx-sm bx-chat"></i>
                            <span class="font-bold">Chat</span>
                        </a>
                    </li>
                    <li class="notifications">
                        <a class="button-change-page-active" href="./notifications.html">
                            <i class="bx bx-sm bx-bell"></i>
                            <span class="font-bold">Notifications</span>
                        </a>
                    </li>
                    <li class="grupos">
                        <a href="./grupos.html">
                            <i class="bx bx-sm bx-group"></i>
                            <span class="font-bold">Grupos</span>
                        </a>
                    </li>
                    <li class="friends">
                        <a href="./friends.html">
                            <i class="bx bx-sm bx-user-plus"></i>
                            <span class="font-bold">Amigos</span>
                        </a>
                    </li>
                    <li class="lista-de-compras">
                        <a href="./lista_de_compras.html">
                            <i class="bx bx-sm bx-edit"></i>
                            <span class="font-bold">Lista de Compras</span>
                        </a>
                    </li>
                    <li class="info">
                        <a href="./sobre_nosotros.html">
                            <i class="bx bx-sm bx-info-circle"></i>
                            <span class="font-bold">Info</span>
                        </a>
                    </li>
                    <li class="usuario">
                        <a href="./user.html">
                            <i class="bx bx-sm bx-user"></i>
                            <span class="font-bold">Usuario</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="content-wrapper">
                <div class="controls-bar">
                    <select id="statusFilter" class="dropdown-select">
                        <option value="all">Todos</option>
                        <option value="read">Leídos</option>
                        <option value="unread">No leídos</option>
                    </select>
                    <div class="search-container">
                        <i class="bx bx-search search-icon"></i>
                        <input type="text" id="notificationSearch" class="search-input" placeholder="Buscar ..." />
                    </div>
                    <select class="filters-select">
                        <option>Filtros</option>
                    </select>
                </div>

                <div class="notifications-container">
                    <div id="notificationsList" class="notifications-list">
                        <!-- JS populated -->
                    </div>
                </div>

                <div class="pagination-container">
                    <div class="pagination-list">
                        <i class="bx bx-chevron-left pagination-item"></i>
                        <span class="pagination-item active">1</span>
                        <i class="bx bx-chevron-right pagination-item"></i>
                    </div>
                </div>
            </div>
        </div>

        <script
            type="module"
            src="../src/components/preloader/preloader.js"
        ></script>
        <script type="module" src="../src/services/authGuard.js"></script>
        <script type="module" src="../src/components/navbar/navbar.js"></script>
        <script type="module" src="../src/components/notifications/notifications.js"></script>
    </body>
</html>
