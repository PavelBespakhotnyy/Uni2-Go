<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Icons -->
    <link rel="icon" href="../public/images/calendar.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="../public/images/calendar.ico">
    <!-- Page Title -->
    <title>Recuperar contraseña</title>
    <!-- Connecting Styles -->
    <link rel="stylesheet" href="/src/components/preloader/preloader.css">
    <link rel="stylesheet" href="/src/components/reset_password/reset_password.css">
</head>
<body>
    <div id="preloader">
      <div class="loader"></div>
    </div>

    <div id="content" class="auth-page">

        <a href="./login.html" class="back-link">
            <img src="/images/flecha 1.svg" alt="Volver">
        </a>

        <div class="auth-container">

            <img src="/images/logo_Uni2_Go.svg" class="main-logo" alt="Logo Uni2 Go">

            <h1 class="auth-title">Recuperar contraseña</h1>

            <div class="auth-body">
                <p class="auth-description">
                    Introduzca su correo electrónico o su teléfono móvil. Le enviaremos un código para que pueda renovar su contraseña. Gracias
                </p>

                <div class="input-group">
                    <label class="input-label">Correo electronico o numero de telefono</label>
                    <input type="email" id="email" class="input-field" placeholder="Email">
                </div>
            </div>

            <button id="resetBtn" class="btn-primary">
                Recuperar
            </button>

            <p id="message" class="status-message"></p>
        </div>
    </div>

    <script type="module" src="../src/components/preloader/preloader.js"></script>
    <script type="module" src="../src/services/authGuard.js"></script>
    <script type="module" src="../src/components/reset_password/reset_password.js"></script>

</body>
</html>
