<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/components/preloader/preloader.css">

</head>
<body>

    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div id="content">

        <a href="/">
            <img src="/images/flecha 1.svg">
        </a>
        <form method="post" action="/Uni2 Go/frontend/pages/registration.html" id="registroForm">
        <img src="/images/logo Uni2 Go.svg" alt="Logo Uni2 Go">
        <h1>Regístrate</h1>
        
        <div>
            <label>Nombre de usuario</label><br>
            <input type="text" name="usuarioNombre" required>
        </div>

        <div>
            <label>Apellido de usuario</label><br>
            <input type="text" name="usuarioApellido" required>
        </div>
        
        <div>
            <label>Fecha de nacimiento</label><br>
            <input type="date" name="nacimiento" required>
        </div>
        
        <div>
            <label>Correo Electrónico</label><br>
            <input type="text" name="Correo" required>
        </div>
        
        <div>
            <label>Teléfono</label><br>
            <input type="number" name="Telefono" required>
        </div>
        
        <div>
            <label>Contraseña</label><br>
            <input type="password" name="contrasena" id="contrasena" required>
        </div>
        
        <div>
            <label>Confirmar Contraseña</label><br>
            <input type="password" name="confcontrasena" id="confcontrasena" required>
        </div>
        
        <input type="submit" name="enviar" value="Registrarse">
    </form>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Seleccionamos el formulario por su ID
        const form = document.getElementById('registroForm');

        // Escuchamos el evento de envío del formulario
        form.addEventListener('submit', function(event) {
            
            // Obtenemos los valores de los campos de contraseña
            const contrasena = document.getElementById('contrasena').value;
            const confContrasena = document.getElementById('confcontrasena').value;

            // Verificamos si las contraseñas no coinciden
            if (contrasena !== confContrasena) {
                
                // 1. Detenemos el envío del formulario a la página de acción
                event.preventDefault(); 
                
                // 2. Alertamos al usuario del error
                alert('Error: Las contraseñas no coinciden. Por favor, verifícalas.');
                
                // 3. Limpiamos el campo de confirmación para que el usuario reintente
                document.getElementById('confcontrasena').value = ''; 
            } else {
               event.preventDefault(); 
    
                // Y redirigimos manualmente al usuario a la página de login
                // Ajusta la ruta a tu estructura de archivos correcta:
                window.location.href = '/Uni2_Go/frontend/pages/login.html';
            }
           
        });
    });
    </script>
    </div>

    <script type="module" src="/src/components/preloader/preloader.js"></script>

</body>
</html>
