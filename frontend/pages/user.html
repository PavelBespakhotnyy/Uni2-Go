<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Usuario</title>
        <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../src/style.css" id="main-style" />
        <link rel="stylesheet" href="../src/components/navbar/navbar.css" />
        <link rel="stylesheet" href="../src/components/user/user.css" />
        <link rel="stylesheet" href="../src/components/user/panel-lateral.css" />
    </head>

    <body>
        <div id="info-panel" class="info-panel">
            <div class="info-panel-header">
                <span id="close-panel" class="close-btn">×</span>
                <h2>Información personal</h2>
            </div>

            <div class="info-panel-content">
                <div class="field">
                    <label>Nombre</label>
                    <div class="field-box">
                        <input type="text" id="edit-name">
                        <i class='bx bx-pencil'></i>
                    </div>
                </div>

                <div class="field">
                    <label>Apellido</label>
                    <div class="field-box">
                        <input type="text" id="edit-surname">
                        <i class='bx bx-pencil'></i>
                    </div>
                </div>

                <div class="field">
                    <label>Usuario</label>
                    <div class="field-box">
                        <input type="text" id="edit-username">
                        <i class='bx bx-pencil'></i>
                    </div>
                </div>

                <div class="field">
                    <label>Email</label>
                    <div class="field-box">
                        <input type="email" id="edit-email">
                        <i class='bx bx-pencil'></i>
                    </div>
                </div>

                <div class="field">
                    <label>Teléfono</label>
                    <div class="field-box">
                        <input type="text" id="edit-phone">
                        <i class='bx bx-pencil'></i>
                    </div>
                </div>

                <div class="field">
                    <label>Contraseña</label>
                    <div class="field-box">
                        <input type="password" id="edit-password">
                        <i id="toggle-password" class='bx bx-hide'></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="preloader">
            <div class="loader"></div>
        </div>

        <div class="main-container">
            <nav class="sidebar" id="navbar">
                <div class="sidebar-top-part">
                    <a href="../index.html">
                        <img class="sidebar-logo" src="../public/images/logo_Uni2_Go.svg" />
                    </a>
                    <span class="sidebar-button bx bx-sm bx-sidebar"></span>
                </div>

                <ul class="buttons-list">
                    <li class="calendar">
                        <a href="./calendar.html">
                            <i class="bx bx-sm bx-calendar"></i>
                            <span class="font-bold">Calendar</span>
                        </a>
                    </li>
                    <li class="chat">
                        <a href="./chat.html">
                            <i class="bx bx-sm bx-chat"></i>
                            <span class="font-bold">Chat</span>
                        </a>
                    </li>
                    <li class="notifications">
                        <a href="./notifications.html">
                            <i class="bx bx-sm bx-bell"></i>
                            <span class="font-bold">Notifications</span>
                        </a>
                    </li>
                    <li class="grupos">
                        <a href="./grupos.html">
                            <i class="bx bx-sm bx-group"></i>
                            <span class="font-bold">Grupos</span>
                        </a>
                    </li>
                    <li class="friends">
                        <a href="./friends.html">
                            <i class="bx bx-sm bx-user-plus"></i>
                            <span class="font-bold">Amigos</span>
                        </a>
                    </li>
                    <li class="lista-de-compras">
                        <a href="./lista_de_compras.html">
                            <i class="bx bx-sm bx-edit"></i>
                            <span class="font-bold">Lista de Compras</span>
                        </a>
                    </li>
                    <li class="info">
                        <a href="./sobre_nosotros.html">
                            <i class="bx bx-sm bx-info-circle"></i>
                            <span class="font-bold">Info</span>
                        </a>
                    </li>
                    <li class="usuario">
                        <a class="button-change-page-active" href="./user.html">
                            <i class="bx bx-sm bx-user"></i>
                            <span class="font-bold">Usuario</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="content-wrapper">
                <div class="user-profile">
                    </div>

                <div class="user-content">
                    <div>
                        <h1>Nombre</h1>
                        <h1 id="user-name">
                            <span class="field-text"></span>
                        </h1>
                    </div>
                    <div>
                        <h1>Apellido</h1>
                        <h1 id="user-lastname">
                            <span class="field-text"></span>
                        </h1>
                    </div>
                </div>

                <div class="friend-code-container">
                    <p class="friend-code-label">Tu nombre de perfil</p>
                    <div class="friend-code-box">
                        <span id="user-username">—</span>
                    </div>
                </div>

                <div class="info-container">
                    <div class="info-item">
                        <button type="button" id="btn-info" class="btn-primary">
                            Informacion personal
                        </button>
                    </div>
                </div>

                <div class="button-sign-out">
                    <button type="button" id="btn-logout" class="btn-tertiary">
                        <img class="icon-logout" src="../public/images/cerrar-sesion.png" alt="Cerrar sesión" />
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </div>

        <script type="module" src="../src/components/preloader/preloader.js"></script>
        <script type="module" src="../src/services/authGuard.js"></script>
        <script type="module" src="../src/components/navbar/navbar.js"></script>
        <script type="module" src="../src/components/user/user.js"></script>
    </body>
</html>
